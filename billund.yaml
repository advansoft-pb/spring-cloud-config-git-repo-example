server:
  port: 8072
 
eureka:
  instance:
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://kolding:8070/eureka/

spring:
  cloud:
    loadbalancer.ribbon.enabled: false
    gateway:
        routes:
        - id: aarhus
          uri: lb://aarhus
          predicates:
          - Path=/aarhus/**
          filters:
          - RewritePath=/aarhus/(?<path>.*), /$\{path}
        - id: odense
          uri: lb://odense
          predicates:
          - Path=/odense/**
          filters:
          - RewritePath=/odense/(?<path>.*), /$\{path}

management:
  endpoints:
    web:
      exposure:
        include: "*"

